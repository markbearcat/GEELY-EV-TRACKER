<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" ry="96" fill="#060b14"/>
  <!-- Subtle glow -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#00d4b8" stroke-width="1" opacity="0.12"/>

  <defs>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00e5cc"/>
      <stop offset="100%" stop-color="#007a6e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Real Geely Logo (white-tinted region behind logo for contrast) -->
  <rect x="126" y="42" width="260" height="180" rx="16" fill="#f0f6ff" opacity="0.92"/>
  <image x="136" y="52" width="240" height="160"
         href="data:image/png;base64,"
         preserveAspectRatio="xMidYMid meet"/>

  <!-- Teal accent bar -->
  <rect x="80" y="234" width="352" height="3" rx="1.5" fill="#00d4b8" opacity="0.4"/>

  <!-- "EX5 INSPIRE" label -->
  <text x="256" y="286"
        font-family="Orbitron, monospace" font-size="30" font-weight="900"
        fill="#00d4b8" text-anchor="middle" letter-spacing="4">EX5</text>
  <text x="256" y="314"
        font-family="Orbitron, monospace" font-size="14" font-weight="500"
        fill="#6a88aa" text-anchor="middle" letter-spacing="6">INSPIRE</text>

  <!-- Teal accent bar -->
  <rect x="80" y="328" width="352" height="3" rx="1.5" fill="#00d4b8" opacity="0.2"/>

  <!-- Lightning bolt  -->
  <g transform="translate(196, 354)" filter="url(#glow)">
    <path d="M 60 0 L 20 56 L 48 56 L 40 96 L 80 40 L 52 40 Z"
          fill="url(#boltGrad)" stroke="#00e5cc" stroke-width="2"
          stroke-linejoin="round"/>
  </g>

  <!-- "GEELY EV TRACKER" footer -->
  <text x="256" y="490"
        font-family="Orbitron, monospace" font-size="14" font-weight="700"
        fill="#384e68" text-anchor="middle" letter-spacing="3">EV TRACKER</text>
</svg>